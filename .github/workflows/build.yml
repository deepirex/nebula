name: Build installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --mac dmg --arm64 --x64
          - os: windows-latest
            args: --win nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build with electron-builder
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: nebula-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: installers
      - name: Rename installers to device-explicit names
        run: |
          cd installers
          for f in *-arm64.dmg; do [ -e "$f" ] && mv "$f" "${f%-arm64.dmg}-Mac-AppleSilicon.dmg"; done
          for f in *.dmg; do
            case "$f" in *Mac-AppleSilicon*) ;; *) [ -e "$f" ] && mv "$f" "${f%.dmg}-Mac-Intel.dmg";; esac
          done
          for f in *.exe; do [ -e "$f" ] && n="${f// /.}" && mv "$f" "${n%.exe}-Windows.exe"; done
          ls -la
      - name: Write download guide
        run: |
          cat > notes.md <<'EOF'
          ## Which file do I download?

          | Your computer | Download the file ending in |
          |---|---|
          | 🍎 Mac with Apple Silicon (M1/M2/M3/M4 — most Macs from 2021 onward) | `Mac-AppleSilicon.dmg` |
          | 🍎 Mac with an Intel processor (most Macs from 2020 and earlier) | `Mac-Intel.dmg` |
          | 🖥️ Windows 10 / 11 | `Windows.exe` |

          Not sure which Mac you have? Apple menu →  **About This Mac**: "Chip: Apple M…" means Apple Silicon; "Processor: Intel…" means Intel.

          **First launch** (the app is not yet code-signed):
          - **macOS**: right-click the app → **Open** → Open (needed once).
          - **Windows**: if SmartScreen appears, click **More info** → **Run anyway**.

          Nebula is fully offline — it never connects to the internet, and deletions only ever go to the Trash / Recycle Bin.
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          files: installers/*
          body_path: notes.md
